<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1020"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="320" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06b6d4"/>
      <stop offset="0.4" stop-color="#2563eb"/>
      <stop offset="0.7" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="700" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#fb923c"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Compass mark -->
  <g transform="translate(230 315)">
    <circle r="160" stroke="url(#ring)" stroke-width="11"/>
    <path d="M0 -150 L24 0 L0 0 Z" fill="#3b82f6"/>
    <path d="M0 -150 L-24 0 L0 0 Z" fill="#1e40af"/>
    <path d="M0 150 L-24 0 L0 0 Z" fill="#7c3aed"/>
    <path d="M0 150 L24 0 L0 0 Z" fill="#5b21b6"/>
    <path d="M-150 0 L0 -24 L0 0 Z" fill="#0891b2"/>
    <path d="M-150 0 L0 24 L0 0 Z" fill="#06b6d4"/>
    <path d="M150 0 L0 24 L0 0 Z" fill="#f97316"/>
    <path d="M150 0 L0 -24 L0 0 Z" fill="#dc2626"/>
    <circle r="30" fill="#fff"/>
    <circle r="30" fill="none" stroke="#2563eb" stroke-width="6"/>
    <circle r="12" fill="#1e3a8a"/>
  </g>

  <!-- Wordmark -->
  <text x="470" y="300" font-family="Vazirmatn, Tahoma, sans-serif" font-size="120" font-weight="800" fill="url(#txt)" direction="rtl">قطب‌نما</text>
  <text x="470" y="380" font-family="Vazirmatn, Tahoma, sans-serif" font-size="42" fill="#cbd5e1" direction="rtl">اندیشه‌ات را بهتر بشناس.</text>
  <text x="470" y="450" font-family="Inter, sans-serif" font-size="30" fill="#94a3b8">Qotbnama · Discover your political orientation</text>
</svg>
