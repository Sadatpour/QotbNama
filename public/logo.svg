<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="قطب‌نما">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06b6d4"/>
      <stop offset="0.4" stop-color="#2563eb"/>
      <stop offset="0.7" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="nNeedle" x1="256" y1="60" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="sNeedle" x1="256" y1="256" x2="256" y2="452" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="wNeedle" x1="60" y1="256" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="eNeedle" x1="256" y1="256" x2="452" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fb923c"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Outer gradient ring -->
  <circle cx="256" cy="256" r="200" stroke="url(#ring)" stroke-width="14"/>
  <circle cx="256" cy="256" r="168" stroke="url(#ring)" stroke-width="3" opacity="0.5"/>

  <!-- Secondary star (light) -->
  <g opacity="0.5" fill="#cbd5e1">
    <path d="M256 130 L274 256 L256 256 Z"/>
    <path d="M256 382 L238 256 L256 256 Z"/>
    <path d="M130 256 L256 238 L256 256 Z"/>
    <path d="M382 256 L256 274 L256 256 Z"/>
  </g>

  <!-- Main compass needles -->
  <path d="M256 64 L286 256 L256 256 Z" fill="url(#nNeedle)"/>
  <path d="M256 64 L226 256 L256 256 Z" fill="#1e40af"/>
  <path d="M256 448 L226 256 L256 256 Z" fill="url(#sNeedle)"/>
  <path d="M256 448 L286 256 L256 256 Z" fill="#5b21b6"/>
  <path d="M64 256 L256 226 L256 256 Z" fill="url(#wNeedle)"/>
  <path d="M64 256 L256 286 L256 256 Z" fill="#0e7490"/>
  <path d="M448 256 L256 286 L256 256 Z" fill="url(#eNeedle)"/>
  <path d="M448 256 L256 226 L256 256 Z" fill="#dc2626"/>

  <!-- Center hub -->
  <circle cx="256" cy="256" r="40" fill="#ffffff"/>
  <circle cx="256" cy="256" r="40" stroke="#2563eb" stroke-width="8"/>
  <circle cx="256" cy="256" r="16" fill="#1e3a8a"/>

  <!-- Dashed indicator -->
  <g stroke="#312e81" stroke-width="6" stroke-linecap="round">
    <line x1="300" y1="212" x2="300" y2="212"/>
    <line x1="318" y1="194" x2="318" y2="194"/>
    <line x1="336" y1="176" x2="336" y2="176"/>
  </g>
  <circle cx="352" cy="160" r="9" fill="#312e81"/>
</svg>
